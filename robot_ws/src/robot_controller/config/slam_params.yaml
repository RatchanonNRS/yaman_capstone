slam_toolbox:
  ros__parameters:

    # Plugin selection
    solver_plugin: solver_plugins::CeresSolver
    ceres_linear_solver: SPARSE_NORMAL_CHOLESKY
    ceres_preconditioner: SCHUR_JACOBI
    ceres_trust_strategy: LEVENBERG_MARQUARDT
    ceres_dogleg_type: TRADITIONAL_DOGLEG
    ceres_loss_function: None

    # Lifecycle — auto-activate on startup (required in ROS2 Jazzy)
    lifecycle_autostart: true

    # ROS frames
    odom_frame:  odom
    map_frame:   map
    base_frame:  base_footprint
    scan_topic:  /scan

    # TF timing — critical on RPi: give enough time to look up odom→base_footprint
    transform_timeout:  0.5
    tf_buffer_duration: 30.0

    # Mode: mapping
    mode: mapping

    # Throttle scans — process every Nth scan to reduce CPU load on RPi
    throttle_scans: 2

    # Map update rate
    map_update_interval: 5.0        # seconds between map saves to disk

    # Resolution
    resolution: 0.05                # metres per cell

    # Laser range limits
    minimum_laser_range: 0.40       # filter robot's own pillars (corners ~0.39m from lidar)
    max_laser_range: 12.0           # RPLidar C1 max range

    # Minimum travel before updating map (reduces CPU)
    minimum_travel_distance: 0.1
    minimum_travel_heading: 0.1

    # Scan matching
    use_scan_matching: true
    use_scan_barycenter: true

    # Loop closure
    loop_search_maximum_distance: 3.0
    do_loop_closing: true
    loop_match_minimum_chain_size: 10
    loop_match_maximum_variance_coarse: 3.0
    loop_match_minimum_response_coarse: 0.35
    loop_match_minimum_response_fine: 0.45

    # Correlation search window
    correlation_search_space_dimension: 0.5
    correlation_search_space_resolution: 0.01
    correlation_search_space_smear_deviation: 0.1

    # Loop closure search window
    loop_search_space_dimension: 8.0
    loop_search_space_resolution: 0.05
    loop_search_space_smear_deviation: 0.03

    # Scan buffer
    scan_buffer_size: 10
    scan_buffer_maximum_scan_distance: 10.0

    # Link match thresholds
    link_match_minimum_response_fine: 0.45
    link_scan_maximum_distance: 1.5

    # Serialization (map saving)
    serialize_map_on_shutdown: true
    map_file_name: /home/yaman/agv_map
    map_start_at_dock: true
